file_format: MAT
methodology: 'Leave-one-subject-out cross-validation was used to evaluate a general-purpose BCI system without subject-specific
  training. Systematic comparison of algorithms across all signal processing stages: (1) Signal filtering: FIR vs IIR filters;
  (2) Artifact removal: AMUSE vs FastICA; (3) Feature extraction: PWelch, Periodogram, PYULEAR, DWT, STFT, Goertzel; (4) Feature
  selection: entropy-based methods and PCA/SVD; (5) Classification: SVM, LDA, KNN, Naive Bayes, Random Forest, AdaBoost. Optimal
  configuration achieved 74.42% mean accuracy using IIR-Elliptic filter, AMUSE artifact removal, PWelch feature extraction
  with nfft=512, segment length=350, overlap=0.75, and channel-138.'
