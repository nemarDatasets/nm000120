abstract: Brain-computer interfaces (BCIs) have been gaining momentum in making human-computer interaction more natural, especially
  for people with neuro-muscular disabilities. This study focuses on SSVEP-based BCIs and performs a comparative evaluation
  of state-of-the-art algorithms for filtering, artifact removal, feature extraction, feature selection and classification.
  Dataset consists of 256-channel EEG signals from 11 subjects with 5 flickering frequencies (6.66, 7.50, 8.57, 10.00, 12.00
  Hz).
